<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232f3e"/>
      <stop offset="100%" stop-color="#37475a"/>
    </linearGradient>
    <linearGradient id="vpcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="publicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f7ee"/>
      <stop offset="100%" stop-color="#c6f0d6"/>
    </linearGradient>
    <linearGradient id="privateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#d0d8ea"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#ffffff"/>

  <!-- Title Bar -->
  <rect width="900" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect y="38" width="900" height="12" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">AWS ECS Fargate — Production Architecture</text>

  <!-- Internet / Users -->
  <g filter="url(#shadow)">
    <rect x="370" y="68" width="160" height="44" rx="22" fill="#1e293b"/>
    <text x="450" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">&#x1F310;  Internet Users</text>
  </g>

  <!-- Arrow: Internet -> IGW -->
  <line x1="450" y1="112" x2="450" y2="148" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="462" y="135" fill="#2563eb" font-size="10" font-weight="600">HTTPS 443</text>

  <!-- AWS Cloud boundary -->
  <rect x="40" y="145" width="820" height="455" rx="10" fill="none" stroke="#ff9900" stroke-width="2" stroke-dasharray="8 4"/>
  <rect x="48" y="148" width="90" height="22" rx="4" fill="#ff9900"/>
  <text x="93" y="163" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">AWS Cloud</text>

  <!-- VPC Box -->
  <rect x="60" y="180" width="780" height="400" rx="8" fill="url(#vpcGrad)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="80" y="202" fill="#334155" font-size="13" font-weight="700">VPC</text>
  <text x="115" y="202" fill="#64748b" font-size="11">10.x.0.0/16</text>

  <!-- Internet Gateway -->
  <g filter="url(#shadow)">
    <rect x="390" y="155" width="120" height="36" rx="6" fill="#ff9900"/>
    <text x="450" y="178" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Internet Gateway</text>
  </g>

  <!-- ACM Certificate (top right) -->
  <g filter="url(#shadow)">
    <rect x="660" y="155" width="150" height="36" rx="6" fill="#dd6b10"/>
    <text x="735" y="172" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">ACM Certificate</text>
    <text x="735" y="184" text-anchor="middle" fill="#ffe0b2" font-size="9">TLS 1.3 (optional)</text>
  </g>

  <!-- Public Subnets Box -->
  <rect x="80" y="215" width="740" height="140" rx="6" fill="url(#publicGrad)" stroke="#86efac" stroke-width="1.5"/>
  <text x="100" y="236" fill="#166534" font-size="12" font-weight="700">Public Subnets</text>
  <text x="228" y="236" fill="#4ade80" font-size="10">us-east-1a  &amp;  us-east-1b</text>

  <!-- ALB -->
  <g filter="url(#shadow)">
    <rect x="200" y="250" width="280" height="50" rx="8" fill="#2563eb"/>
    <text x="340" y="272" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Application Load Balancer</text>
    <text x="340" y="290" text-anchor="middle" fill="#bfdbfe" font-size="10">HTTP :80 &#x2192; 301 Redirect  |  HTTPS :443 &#x2192; Forward</text>
  </g>

  <!-- Arrow: IGW -> ALB -->
  <line x1="450" y1="191" x2="400" y2="248" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ACM -> ALB dashed line -->
  <line x1="660" y1="178" x2="482" y2="265" stroke="#dd6b10" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>

  <!-- NAT Gateway -->
  <g filter="url(#shadow)">
    <rect x="600" y="260" width="160" height="40" rx="6" fill="#16a34a"/>
    <text x="680" y="285" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">NAT Gateway</text>
  </g>

  <!-- Arrow: IGW -> NAT -->
  <line x1="480" y1="191" x2="640" y2="258" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>

  <!-- Security Group label for ALB -->
  <rect x="200" y="305" width="280" height="20" rx="4" fill="#dbeafe"/>
  <text x="340" y="319" text-anchor="middle" fill="#1e40af" font-size="10">SG: Allow 80/443 inbound from 0.0.0.0/0</text>

  <!-- Private Subnets Box -->
  <rect x="80" y="370" width="740" height="190" rx="6" fill="url(#privateGrad)" stroke="#93a8d0" stroke-width="1.5"/>
  <text x="100" y="391" fill="#1e3a5f" font-size="12" font-weight="700">Private Subnets</text>
  <text x="228" y="391" fill="#7c93c0" font-size="10">us-east-1a  &amp;  us-east-1b</text>

  <!-- ECS Cluster box -->
  <rect x="120" y="405" width="660" height="140" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="140" y="425" fill="#475569" font-size="11" font-weight="600">ECS Cluster (Fargate)</text>

  <!-- Fargate Task 1 -->
  <g filter="url(#shadow)">
    <rect x="150" y="440" width="170" height="85" rx="6" fill="#7c3aed"/>
    <text x="235" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Fargate Task</text>
    <rect x="165" y="470" width="140" height="20" rx="4" fill="#6d28d9"/>
    <text x="235" y="484" text-anchor="middle" fill="#e0d4fc" font-size="10">Container :80</text>
    <rect x="165" y="496" width="140" height="20" rx="4" fill="#6d28d9"/>
    <text x="235" y="510" text-anchor="middle" fill="#e0d4fc" font-size="10">awslogs &#x2192; CloudWatch</text>
  </g>

  <!-- Fargate Task 2 -->
  <g filter="url(#shadow)">
    <rect x="365" y="440" width="170" height="85" rx="6" fill="#7c3aed"/>
    <text x="450" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Fargate Task</text>
    <rect x="380" y="470" width="140" height="20" rx="4" fill="#6d28d9"/>
    <text x="450" y="484" text-anchor="middle" fill="#e0d4fc" font-size="10">Container :80</text>
    <rect x="380" y="496" width="140" height="20" rx="4" fill="#6d28d9"/>
    <text x="450" y="510" text-anchor="middle" fill="#e0d4fc" font-size="10">awslogs &#x2192; CloudWatch</text>
  </g>

  <!-- Fargate Task N -->
  <g filter="url(#shadow)">
    <rect x="580" y="440" width="170" height="85" rx="6" fill="#7c3aed" opacity="0.7"/>
    <text x="665" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Fargate Task</text>
    <rect x="595" y="470" width="140" height="20" rx="4" fill="#6d28d9" opacity="0.7"/>
    <text x="665" y="484" text-anchor="middle" fill="#e0d4fc" font-size="10">Container :80</text>
    <rect x="595" y="496" width="140" height="20" rx="4" fill="#6d28d9" opacity="0.7"/>
    <text x="665" y="510" text-anchor="middle" fill="#e0d4fc" font-size="10">&#xB7;&#xB7;&#xB7; &#xD7; desired_count</text>
  </g>

  <!-- Security Group label for ECS Tasks -->
  <rect x="150" y="530" width="600" height="20" rx="4" fill="#ede9fe"/>
  <text x="450" y="544" text-anchor="middle" fill="#5b21b6" font-size="10">SG: Allow container port inbound from ALB Security Group only</text>

  <!-- Arrow: ALB -> Task 1 -->
  <line x1="300" y1="300" x2="235" y2="438" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: ALB -> Task 2 -->
  <line x1="340" y1="300" x2="420" y2="438" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: ALB -> Task N -->
  <line x1="380" y1="300" x2="620" y2="438" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: Tasks -> NAT (outbound) -->
  <path d="M 665 440 Q 730 380 700 302" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <text x="738" y="370" fill="#64748b" font-size="9" font-weight="500">Outbound</text>
  <text x="738" y="381" fill="#64748b" font-size="9" font-weight="500">(ECR, etc.)</text>

  <!-- IAM Roles (bottom right, outside VPC) -->
  <g filter="url(#shadow)">
    <rect x="700" y="570" width="170" height="36" rx="6" fill="#0ea5e9"/>
    <text x="785" y="587" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">IAM Roles</text>
    <text x="785" y="600" text-anchor="middle" fill="#e0f2fe" font-size="9">Execution + Task</text>
  </g>

  <!-- CloudWatch (bottom left) -->
  <g filter="url(#shadow)">
    <rect x="40" y="570" width="150" height="36" rx="6" fill="#e11d48"/>
    <text x="115" y="593" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">CloudWatch Logs</text>
  </g>

  <!-- Legend -->
  <g transform="translate(250, 572)">
    <line x1="0" y1="12" x2="30" y2="12" stroke="#2563eb" stroke-width="2"/>
    <text x="35" y="16" fill="#475569" font-size="10">Inbound traffic</text>
    <line x1="130" y1="12" x2="160" y2="12" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="165" y="16" fill="#475569" font-size="10">Outbound traffic</text>
    <line x1="270" y1="12" x2="300" y2="12" stroke="#dd6b10" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="305" y="16" fill="#475569" font-size="10">TLS termination</text>
  </g>
</svg>
